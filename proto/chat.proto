syntax = "proto3";

package pulse;

// ============================================================================
// Chat Messages
// ============================================================================

// Chat message from client
message ChatMessage {
    string session_id = 1;
    string user_id = 2;
    string content = 3;
    int64 timestamp = 4;
}

// Chat response to client
message ChatResponse {
    enum MessageType {
        THINKING = 0;
        CONTENT = 2;
        ACTION = 3;
        COMPLETE = 4;
        ERROR = 5;
    }
    MessageType type = 1;
    string content = 2;
    repeated Action actions = 3;
    string error = 4;
    string session_id = 5;
}

// Suggested action button
message Action {
    string id = 1;
    string label = 2;
    string action_type = 3;
    map<string, string> params = 4;
    string style = 5;  // primary, secondary, outline
    string icon = 6;  // optional icon name
}

// ============================================================================
// Authentication Messages
// ============================================================================

// Login request
message LoginRequest {
    string email = 1;
    string password = 2;
}

// Login response
message LoginResponse {
    string access_token = 1;
    string refresh_token = 2;
    string token_type = 3;
    int64 expires_in = 4;
}

// Token refresh request
message RefreshRequest {
    string refresh_token = 1;
}

// ============================================================================
// SSE Streaming Messages
// ============================================================================

// SSE message for streaming responses
message SSEMessage {
    enum MessageType {
        THINKING = 0;
        CONTENT = 2;
        ACTION = 3;
        COMPLETE = 4;
        ERROR = 5;
    }
    MessageType type = 1;
    string content = 2;
    repeated Action actions = 3;
    string error = 4;
    string session_id = 5;
}

// Stream chunk for SSE
message StreamChunk {
    string event = 1;  // event name
    string data = 2;   // JSON data
    string id = 3;     // optional event ID
}

// ============================================================================
// Common Types
// ============================================================================

// User info
message UserInfo {
    string user_id = 1;
    string email = 2;
    string name = 3;
    string role = 4;
    string unit_id = 5;
}

// Error response
message ErrorResponse {
    int32 code = 1;
    string message = 2;
    string details = 3;
}
