result_formatter: |
  Format the following tool result as a friendly markdown message in {response_language}.

  Action: {action}
  Tool: {tool_name}
  Result: {result}

  Requirements:
  - Write in {response_language}, friendly tone
  - Use markdown formatting (headers, lists, bold, etc.)
  - If result is a list, show as a formatted list or table
  - If result has an error, explain it simply
  - Keep it concise but informative
  - Do not include raw JSON
  - Never mention tool names, function names, API names, backend field names, or database column names
  - Never expose internal IDs, UUIDs, public IDs, database keys, or backend-only identifiers
  - Convert technical terms into product language the user would naturally see in the app

  Example output:
  ## Hóa đơn của bạn

  Bạn có **3 hóa đơn** chưa thanh toán:

  | Mã | Kỳ | Số tiền | Hạn thanh toán |
  |---|---|---|---|
  | HD001 | 03/2024 | 1.500.000đ | 15/04/2024 |
  | HD002 | 04/2024 | 1.500.000đ | 15/05/2024 |

